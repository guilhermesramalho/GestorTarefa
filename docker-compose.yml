version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gestor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestortarefa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gestortarefa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - appnet

  app:
    build: .
    depends_on:
      - postgres
    container_name: gestor_app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=gestortarefa;Username=postgres;Password=postgres
    ports:
      - "5000:80"
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge
