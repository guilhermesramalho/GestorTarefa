name: CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

env:
  DOTNET_VERSION: '9.0.x'
  REGISTRY: ghcr.io

jobs:
  build-test-and-package:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_name: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
   
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.local/share/NuGet
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ./Application/GestorTarefa.csproj

      - name: Build
        run: dotnet build ./Application/GestorTarefa.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test ./Test --no-build --configuration Release --verbosity normal

      - name: Set image name
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ env.REGISTRY }}/$REPO:${{ github.sha }}"
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          echo "Building $IMAGE_NAME"
          docker build -t $IMAGE_NAME ./Application

      - name: Push Docker image
        if: github.event_name == 'push'
        run: docker push $IMAGE_NAME

     
      - name: Check for Kubernetes manifests
        id: check_manifests
        run: |
          if [ -d "k8s" ] || ls *.yaml 1> /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install kubectl
        if: steps.check_manifests.outputs.exists == 'true'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Validate Kubernetes manifests (dry-run)
        if: steps.check_manifests.outputs.exists == 'true'
        run: |
          echo "Validating manifests..."
          kubectl apply --dry-run=client -f k8s

  deploy:
    name: Deploy (future stage)
    needs: build-test-and-package
    runs-on: ubuntu-latest
    if: false # desabilitado por enquanto

    steps:
      - name: Placeholder
        run: echo "Future Kubernetes deployment step"